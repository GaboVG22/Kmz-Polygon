name: Build Windows executable

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify Python files
        shell: pwsh
        run: |
          python -m py_compile app.py
          python -m py_compile core.py
          python -m py_compile streamlit_launcher.py

      - name: Build Windows executable with PyInstaller
        shell: pwsh
        run: |
          python -m PyInstaller `
            --noconfirm `
            --clean `
            --onedir `
            --name KMZ_3D_Volumenes `
            --collect-all streamlit `
            --collect-all pyproj `
            --collect-all shapely `
            --collect-data matplotlib `
            --add-data "app.py;." `
            --add-data "core.py;." `
            --add-data "sample_data;sample_data" `
            streamlit_launcher.py

      - name: Copy documentation into executable folder
        shell: pwsh
        run: |
          Copy-Item README.md dist/KMZ_3D_Volumenes/README.md -Force
          Copy-Item SOLUCION_SI_VES_EL_README.md dist/KMZ_3D_Volumenes/SOLUCION_SI_VES_EL_README.md -Force -ErrorAction SilentlyContinue

      - name: Compress executable folder
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/KMZ_3D_Volumenes/*" -DestinationPath "KMZ_3D_Volumenes_Windows.zip" -Force

      - name: Upload Windows executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: KMZ_3D_Volumenes_Windows
          path: KMZ_3D_Volumenes_Windows.zip
          retention-days: 30
